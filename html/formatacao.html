<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação</title>
</head>
<body>

    <h1>Trabalhando com formatação em HTML</h1>

    <p>Para utilizar o negrito, usamos a tag
        <strong>strong, todas as palavras dentro da tag ficam em negrito </strong>
        fora da tag strong, o texto volta ao padrão
    </p>

    <p>Para deixar o texto em italico, utilizamos a tag "em" <em>Este é um exemplo de um texto em italico </em> </p>

    <p>
        <u>Exemplo de texto
            <mark>sublinhado</mark>
        </u>
    </p>

</body>
</html>
