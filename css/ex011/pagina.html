<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            background-color: rgb(83, 81, 81);
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #logo {
            color: white;
            font-size: 36px;
        }

        nav>a {
            color: white;
            font-size: 24px;
            padding: 10px;
            text-decoration: none;
            background-color: black;
            border-radius: 10px;
            transition: 1s;
        }

        nav>a:hover {
            background-color: white;
            color: black;
        }

        #banner {
            background-color: lightblue;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #banner > div{
            font-size: 48px;
        }

        #cards{
            background-color: rgb(247, 229, 229);
            height: 300px;
            display: flex;     
            justify-content: center;       
            align-items: center;
        }

        #cards > div{
            background-color: red;
            width: 200px;
            height: 200px;
            margin-left: 50px;
        }
    </style>
</head>

<body>
    <header>

        <div id="logo">
            MinhaLogo
        </div>

        <nav>
            <a href="">Home</a>
            <a href="">Sobre</a>
            <a href="">Produtos</a>
            <a href="">Contato</a>
        </nav>

    </header>
    <section id="banner">
        <div>
            BANNER
        </div>
    </section>

    <section id="cards">

        <div>
            
        </div>
       
        <div>

        </div>
       
        <div>

        </div>

    </section>
    <section id="cards">

        <div>
            
        </div>
       
        <div>

        </div>
       
        <div>

        </div>

    </section>

</body>

</html>
